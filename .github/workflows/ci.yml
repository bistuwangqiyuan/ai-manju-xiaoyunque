name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend + pipeline (pytest, mock-mode)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      MOCK_MODE: "1"
      FORCE_MOCK_SCORER: "1"
      FORCE_MOCK_THEME: "1"
      FORCE_MOCK_NOVELTY: "1"
      FORCE_MOCK_MARKETING: "1"
      FORCE_MOCK_CONTINUATION: "1"
      FORCE_MOCK_RESTYLE: "1"
      FORCE_MOCK_TRANSLATE: "1"
      FORCE_MOCK_REDRAW: "1"
      FORCE_MOCK_WAN_ANIMATE: "1"
      FORCE_MOCK_TTS_MINIMAX: "1"
      SKIP_CINEMATIC_MASTER: "1"
      JWT_SECRET: ci-secret-for-tests-only-do-not-use
      DATABASE_URL: sqlite:///./data/ci.db

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r backend/requirements.txt
          pip install pytest httpx pytest-asyncio bcrypt

      - name: Pytest (mock-mode end-to-end suite, v8 + serverless + v9 manju)
        run: |
          pytest -q \
            tests/test_orchestrator_v2.py \
            tests/test_repair_loop.py \
            tests/test_genre_templates.py \
            tests/test_batch_redraw.py \
            tests/test_platform_export.py \
            tests/test_theme_to_novel.py \
            tests/test_backend_api.py \
            tests/test_api_contracts.py \
            tests/test_v8_gap_closures.py \
            tests/test_serverless_tick.py \
            tests/test_manju_agent_client.py \
            tests/test_tos_storage.py \
            tests/test_vefaas_deploy.py

  vefaas-dry-run:
    name: veFaaS deploy dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: backend

    env:
      # Dummy values so deploy.py passes credential resolution without
      # hitting the real Volc OpenAPI endpoint.
      VOLC_ACCESS_KEY: AKLTciDryRunFakeAccessKey0000
      VOLC_SECRET_KEY: dryRunFakeSecretKey00000000000000000000000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate deploy.py + Dockerfile present
        run: |
          test -f deploy/cn-volc-vefaas/Dockerfile.vefaas
          test -f deploy/cn-volc-vefaas/run.sh
          test -f deploy/cn-volc-vefaas/deploy.py
          test -f deploy/cn-volc-vefaas/Caddyfile.vefaas
          test -f deploy/cn-volc-vefaas/VEFAAS_RUNBOOK.md

      - name: deploy.py --help
        run: python deploy/cn-volc-vefaas/deploy.py --help

      - name: deploy.py --dry-run
        run: |
          python deploy/cn-volc-vefaas/deploy.py \
            --image-tag ci-dry-run-${{ github.run_id }} \
            --app-name xyq-manju-ci \
            --image-repo cr-cn-beijing.volces.com/xyq/manju \
            --dry-run

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: deploy/cn-volc-vefaas/Dockerfile.vefaas
          failure-threshold: error
        continue-on-error: true

  frontend:
    name: web (typecheck + next build)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npx next build
