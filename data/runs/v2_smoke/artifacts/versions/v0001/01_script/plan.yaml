    camera_motion: 俯冲
    duration_seconds: 3.0
    key_visual: 蜡烛灭 + 月光铺地
    scene: lanruosi
    shot_id: 18
    type: wide
    voiceover: （旁白）从这一夜起，宁采臣的命运彻底改变了
  - action_desc: 镜面渐近，月光在镜面缓缓晕开
    audio_cues:
