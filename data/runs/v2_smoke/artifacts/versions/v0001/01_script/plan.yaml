  synopsis: '宁采臣穷困投宿兰若寺，雨夜从夜市归来。

    巧遇南舍燕赤霞，相约定交。

    夜半月下，宁独坐案前忽窥见女郎影于壁际。

    推门望去，月色下绝美少女回头望他。

    '
