  ep10: { black_vine: 0.0,  ghost_aura: 0.00, eye_blue: 0.00 }

# ---------------- Seedream 5.0 主图 prompt 前缀 ----------------
seedream_prompt_prefix: |
  古风3D国漫风格女主角"聂小倩"，18 岁女鬼，
  眉间一点朱砂痣（永远可见，#C5283D），
  杏眼浅蓝灰带幽光，黛眉颦颦，
  及腰青丝齐刘海两股细辫盘顶白玉桃簪，
  白色襦裙 + 浅粉缎带 + 薄纱披帛飘逸感，
  左肩有淡淡黑色藤纹束缚标记（visibility 0.3），
  左手腕白玉镯半透质感，
  皮肤偏冷青鬼气环绕（visibility 0.3-0.5），
  cel-shading 卡通描边 + Unreal Engine 5 路径追踪，
  冷青 + 月白 + 朱砂主色调。

# ---------------- 即梦 4.6 变体 prompt ----------------
jimeng_variant_prompt: |
  聂小倩 6 张变体：(1) 月下回眸惊鸿一瞥；
  (2) 三更白衣叩门浅笑；
  (3) 泣诉身世掩面低泣（露出眉间朱砂痣特写）；
  (4) 月下指向白杨树轻抚黑藤；
  (5) 喜服红妆持红盖头（黑藤暴起 visibility 0.8）；
  (6) 人化后阳光下温暖微笑抱稚子。
  保持眉间朱砂痣 + 左肩黑藤 + 白玉镯 三大锁定符号。

