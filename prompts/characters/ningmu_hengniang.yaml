id: ningmu_hengniang
name_zh: 宁母 + 恒娘（合卡）
role: 配角（情感线推动）
appearance_in_episodes: [6, 7, 8, 10]

# ===========================================
# 宁母（母亲）
# ===========================================
ningmu:
  age: 55
  height_cm: 158
  body: 微胖慈祥老妇，手指略肿胀（劳作痕迹）
  hair: 银白发挽圆髻于脑后，用一根青玉簪固定；鬓角微乱
  eye: 慈祥温和的丹凤眼，眼角细纹深刻
  attire: |
    深褐色棉布襦裙 + 深蓝褙子，
    腰间挂一串铜钥匙（家中主妇标志）；
    手中常持一双木筷或针线
  accessories:
    - 青玉发簪
    - 铜钥匙串
    - 针线笸箩（ep06 入场戏）
  voice: "温和苍老母亲声，关切但有顾虑；ep06 初见小倩略带防备"

# ===========================================
# 恒娘（病妻）
# ===========================================
hengniang:
  age: 23
  height_cm: 162
  body: 病弱清瘦，脸色苍白，唇无血色
  hair: 长发松松挽于脑后用一根素白绫绑成马尾
  eye: 慈悲眼神，黑眼圈深，眼神疲惫但坦然
  attire: |
    病榻浅蓝色单衣 + 月白罩袍；
    ep07 临终戏：盖一床浅褐麻布薄被
  accessories:
    - 床头一只青瓷药碗
    - 床头一只熏香炉（袅袅青烟）
  voice: "气若游丝病弱女声，柔软但坚定；ep07 临终托付戏感情爆点"

# ===========================================
# 双方共同 prompt 前缀（Seedream 5.0）
# ===========================================
seedream_prompt_prefix: |
  古风3D国漫风格配角卡：
  (左) 宁母 55 岁慈祥老妇，银白发青玉簪盘髻，深褐襦裙 + 深蓝褙子，
  腰挂铜钥匙串，手持木筷，眼神温和带顾虑；
  (右) 恒娘 23 岁病妻，病弱清瘦脸色苍白，长发素白绫马尾，
  浅蓝单衣 + 月白罩袍，盖浅褐麻布薄被，眼神慈悲坦然；
  cel-shading 卡通描边，
  暖橘 + 月白 + 浅褐色调，温情家庭氛围。

jimeng_variant_prompt: |
  4 张变体：(1) ep06 宁母窗前缝衣推门见小倩惊讶；
  (2) ep07 恒娘病榻握小倩手嘱托；
  (3) ep08 婚礼喜堂宁母含泪欣慰；
  (4) ep10 宁母抱稚孙慈祥。

signature_marks:
  - 宁母：腰间铜钥匙串 + 青玉发簪
  - 恒娘：素白绫马尾 + 苍白唇色

