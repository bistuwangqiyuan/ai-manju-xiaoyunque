id: popo_yaowu
name_zh: 姥姥（白杨树妖）
role: 反派（最终 boss）
appearance_in_episodes: [3, 5, 6, 8, 9]

# ---------------- 版权保护说明 ----------------
# ⚠️ 87 版徐克独创了"长舌树妖"造型 → 本项目不得使用！
# ★ 本项目原创版本：「白发千年皮影老妪 + 6 条黑藤根从背后伸出」
# 6 条黑藤为原创锁定符号，需公证留存设计稿。

# ---------------- 外貌锁定（原创设计） ----------------
age: "千年（外形老妇 60-70 岁）"
height_cm: 158
body: |
  外形佝偻老妇，瘦小但能瞬间拉长（妖物变化）；
  皮肤皴裂如老树皮，纹路深刻；
  战斗形态（ep08-09）：身后伸出 6 条粗壮黑藤根，每条直径 5cm，长度可达 3 米
hair: |
  花白银发，盘成髻髻状如树冠，垂落到肩；
  发丝带枯黄叶屑细节
eye: |
  鬼眼无瞳（纯黑两点），战斗时由黑转血红渐变；
  眼眶深陷，眼角下垂数褶
attire: |
  破旧深褐色粗布老妇衣，沾满白杨树皮屑 + 苔藓；
  腰间系一根麻绳，挂一串干枯人骨指节（暗示妖物吸血）
accessories:
  - 干枯人骨指节项链（5 节）
  - 手持一根弯曲松木拐杖（实为收魂法器）
weapon: |
  6 条黑藤根（从背后伸出，可刺穿、可缠绕、可吸血气）；
  战斗时的妖物形态：藤根末端长出兽口
voice: |
  沙哑低沉老妇声，常带笑意（阴险），
  战斗形态：声音双轨叠加（老妇 + 妖物嘶吼）；
  音色 ID voice_popo_v1
voice_actor_style: "类金燕玲低声区 + 后期 distortion"

# ---------------- 原创锁定符号 ----------------
signature_marks:
  - "★ 身后 6 条粗壮黑藤根（直径 5cm，原创设计，回避徐克长舌妖版权）"
  - "★ 白杨虚影（每次出场背景有白杨树虚化轮廓）"
  - 干枯人骨指节项链
  - 皮肤皴裂如老树皮
  - 鬼眼无瞳 → 血红渐变

# ---------------- Seedream 5.0 主图 prompt 前缀 ----------------
seedream_prompt_prefix: |
  古风3D国漫风格反派"姥姥"（白杨树妖），千年妖物外形 60-70 岁老妇，
  佝偻瘦小身材，皮肤皴裂如老树皮，
  花白银发盘成树冠状髻，垂落到肩带枯黄叶屑，
  鬼眼无瞳（纯黑两点），眼眶深陷，
  破旧深褐色粗布衣沾白杨树皮屑 + 苔藓，
  腰间挂干枯人骨指节项链 5 节，
  手持弯曲松木拐杖；
  ★ 身后伸出 6 条粗壮黑藤根（直径 5cm，原创设计），
  ★ 背景始终有白杨树虚影轮廓；
  cel-shading 卡通描边 + Unreal Engine 5 路径追踪，
  墨绿 + 灰褐 + 黑藤暗调，阴森志怪气场（但不血腥）。
  禁忌：禁徐克版长舌（不得使用伸长舌头造型！）

jimeng_variant_prompt: |
  姥姥 6 张变体：(1) ep03 远景背影（黑藤未现）；
  (2) ep05 月下显形（黑藤 visibility 0.4）；
  (3) ep06 黑藤已爬到宁家墙根（局部）；
  (4) ep08 婚礼喜堂破窗而入战斗形态（6 条黑藤暴起）；
  (5) ep09 被革囊吞噬瞬间（震惊表情）；
  (6) 全身设计图展示 6 条黑藤完全展开 + 白杨虚影。

