id: yan_chixia
name_zh: 燕赤霞
role: 重要配角（剑客 / 转折关键）
appearance_in_episodes: [1, 3, 4, 5, 10]

# ---------------- 外貌锁定 ----------------
age: 38
height_cm: 185
body: |
  魁梧但不臃肿，肩宽腰窄；手掌粗大有老茧；
  长时间游历，颧骨略削，肌肉线条紧实
hair: |
  长发束于脑后用一根黑铁簪固定，鬓发掺白；
  胡须：络腮短须，颌下蓄三寸黑须
eye: |
  浓眉鹰眼，眼神锐利如剑；
  眼角细密褶皱（饱经沧桑）；
  喝酒后眼神略软（ep05 离别戏）
attire: |
  深墨色道袍配青色腰带，胸前有一道暗纹刺绣（独门剑派图腾「鴞」）；
  肩上斜披一条暗红披风（剑客标志）；
  腰间挂一只褐色皮革囊（重要道具！）
accessories:
  - "★ 革囊（褐色皮革，掌心大小，内有前剑客之魂，ep09 关键道具）"
  - 腰间一柄短剑（剑鞘黑漆 + 银纹）
  - 酒葫芦（系于腰带左侧）
weapon: |
  主：腰间短剑（出鞘时剑光泛青蓝）；
  备：革囊（内有前剑客之魂，可吸入妖物）
voice: |
  低沉中年男音，磁性沙哑，语速慢且断句利落；
  ep03 战斗：怒喝声粗犷；
  ep05 离别：温和但坚定
voice_actor_style: "类古天乐低音区 / 朱亚文胸腔共鸣"

# ---------------- 锁定符号 ----------------
signature_marks:
  - "★ 腰间褐色革囊（永不离身，ep09 关键回收）"
  - 胸前暗纹「鴞」刺绣
  - 颌下三寸黑须 + 鬓发掺白
  - 右眉骨上一道斜疤（旧伤，长 1.5cm）

