id: baiyangshu
name_zh: 白杨乌巢（小倩埋骨之处）
appearance_in_episodes: [5, 9, 10]

description: |
  兰若寺东南数武处，一棵两人合抱粗的老白杨树，树高约 8 米；
  树干呈现"被劈裂"的纵纹（小倩埋骨处，被妖物破坏过），
  树顶有一个大乌鸦巢（直径 80cm）；
  树下黄土松软，半埋一具青色棺木一角；
  四周野草及膝，月光照下来形成树影投在地面如骨架；
  江岸距此约 30 米（ep05 末"江面血红双眼"伏笔在此 30 米外）。

palette: "墨绿 #2A4034 + 冷青 #1F3A4E + 月白 #E8E4D4"

lighting: |
  月夜：月光透过白杨枯枝形成斑驳光影；
  ep05：树下宁采臣手中提一盏暗黄油灯；
  ep10：尾幕燕赤霞站坟边白花一朵

ambient_sounds:
  - 风过白杨树叶沙沙
  - 乌鸦呱呱
  - 远处江水流声（ep05 中段）
  - 铁锹挖土钝响（ep05 高潮）

key_props:
  - "★ 白杨老树（原创锁定符号之一，对应 popo_yaowu 白杨虚影）"
  - 树顶大乌鸦巢
  - 半埋的青色棺木
  - 一柄铁锹（ep05 道具）
  - 暗黄油灯（ep05 道具）
  - 一朵白花（ep10 尾幕，花心一点朱砂）

seedream_prompt_prefix: |
  古风3D国漫风格场景"白杨乌巢"，
  老白杨树两人合抱粗树高 8 米，
  树干被劈裂纵纹（暗示曾被妖物破坏），
  树顶大乌鸦巢直径 80cm，
  树下黄土松软半埋青色棺木一角，
  四周野草及膝，
  月光透枯枝形成斑驳光影投地面如骨架，
  江岸 30 米外水声潺潺；
  墨绿 + 冷青 + 月白主色调，
  cel-shading 卡通描边，
  阴森志怪意境（但不血腥）。
