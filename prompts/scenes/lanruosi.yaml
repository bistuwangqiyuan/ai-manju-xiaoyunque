id: lanruosi
name_zh: 兰若寺
appearance_in_episodes: [1, 2, 3, 4, 5]

description: |
  位于金华城北郊外约 5 里，背依矮山，紧邻一池荒塘；
  山门两扇朱漆斑驳，匾额「兰若寺」三字金漆剥落；
  正殿三间，左右各有偏殿，南院一小室独立用墙隔出（燕赤霞所居）；
  入夜后蓬蒿没膝，野藤缠绕梁柱，蝙蝠群居檐角；
  整体废弃感强烈，但建筑结构仍保持完整，月色下别有一番幽美。

layout_blocks:
  - main_hall:    "正殿三间，神像残破，地砖积尘半寸；月光从破窗斜射"
  - south_yard:   "南院小室，扉键如新，燕赤霞所居；阶下巨池野藕已花"
  - east_corridor: "东侧回廊，藤蔓覆顶，是宁采臣借住处"
  - north_yard:   "北院偏殿，闹鬼区，小倩与姥姥所居"
  - bell_tower:   "钟楼倾斜 15 度，铜钟仍在但锈迹斑斑"

palette: "冷青 #1F3A4E + 月白 #E8E4D4 + 烛火橘 #D88748"

lighting: |
  夜：月光透过破窗成条状投射，柱影斜长；
  阶下烛火零星（燕赤霞房中、宁采臣案前）；
  雨夜（ep01）：石板路湿光反射月色；雨丝细密呈对角线
  
ambient_sounds:
  - 蝙蝠群飞
  - 风穿藤蔓
  - 远处蛙鸣
  - 雨夜：屋檐滴水

key_props:
  - 破朱漆山门
  - 倾斜铜钟
  - 神像残断手指
  - 案头一盏铜灯
  - 巨池野藕

