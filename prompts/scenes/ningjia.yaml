id: ningjia
name_zh: 宁家（浙江老宅）
appearance_in_episodes: [6, 7, 8, 10]

description: |
  浙江老式三进民居，江南粉墙黛瓦风格；
  前院有一棵桂花树（ep10 桂花开），后院有一口井 + 鸡笼；
  正厅匾额"耕读传家"，案桌摆一组青瓷茶具；
  东厢宁母房（佛龛 + 缝纫笸箩），西厢宁采臣书房（藏书架）；
  ep06-08 小倩入门住西厢偏房；
  ep08 喜堂在正厅，红绸高挂、红烛 16 支；
  ep10 院中天伦戏，桂花纷飞，孩童在桂花树下嬉戏。

layout_blocks:
  - front_yard:  "桂花树 + 青石板路"
  - main_hall:   "正厅匾额耕读传家 + 青瓷茶具"
  - east_room:   "宁母房（佛龛 + 缝纫笸箩）"
  - west_room:   "宁采臣书房（藏书架 + 案桌）"
  - back_yard:   "井 + 鸡笼"

palette: |
  日常：暖黄 #C99B66 + 月白 #E8E4D4 + 灰瓦 #4F5D6B；
  喜堂（ep08）：朱红 #B83838 + 金黄 #D4AF37 大量；
  ep10 桂花：金黄 + 月白

lighting: |
  日：阳光透过窗棂木格条状投射；
  夜：油灯暖黄；
  ep08 喜堂：16 红烛 + 油灯共明，全场橘红；
  ep10 桂花：晨光金黄渗入，桂花点点

ambient_sounds:
  - 桂花树叶沙沙
  - 后院鸡鸣
  - 缝纫笸箩棉布翻动
  - ep08：唢呐喜乐 + 鞭炮远响
  - ep10：孩童嬉笑 + 鸽鸣

key_props:
  - 前院桂花树
  - 后院水井 + 鸡笼
  - 正厅匾额"耕读传家"
  - 青瓷茶具
  - ep08 红绸 + 16 红烛 + 喜字双囍剪纸
  - ep10 桂花纷飞 + 童玩拨浪鼓

seedream_prompt_prefix: |
  古风3D国漫风格场景"宁家老宅"，
  浙江三进民居粉墙黛瓦风格，
  前院桂花树 + 青石板路，
  正厅匾额"耕读传家" + 青瓷茶具，
  东厢宁母房有佛龛 + 缝纫笸箩，
  西厢宁采臣书房有藏书架案桌，
  后院水井 + 鸡笼；
  日常：暖黄 + 月白 + 灰瓦色调；
  喜堂（ep08）：朱红 + 金黄大量，
  16 红烛 + 红绸高挂 + 双喜剪纸；
  ep10 桂花：晨光金黄渗入桂花点点；
  cel-shading 卡通描边，
  江南温情家庭氛围。
