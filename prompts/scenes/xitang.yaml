id: xitang
name_zh: 喜堂（婚礼现场）
appearance_in_episodes: [8, 9]

description: |
  宁家正厅改造的婚礼喜堂，
  正中悬「百年好合」匾额（红底金字），
  正堂上方悬巨大「囍」字红绸（边长 1.5m）；
  16 红烛分列两旁（每根 50cm 高），地铺红毯；
  案桌上置「天地君亲师」牌位 + 三炷青香 + 红盖头一只；
  喜堂外院摆 8 桌喜宴，宾客 30 人；
  唢呐与锣鼓队 5 人立于院口。
  
  ep08 高潮：当小倩与宁采臣对拜天地，喜堂突变——
  正堂外院黑藤暴起破石板，破窗而入直撞喜字红绸；
  ep09 高潮：革囊从燕赤霞之前所赠位置（宁采臣腰间）滑落，
  自动悬于户上，囊口大开，前剑客之魂的苍白手伸出，吞噬姥姥。

palette: |
  喜堂常态（ep08 前段）：朱红 #B83838 + 金黄 #D4AF37 + 烛火橘 #D88748；
  ep08 黑藤突袭：朱红 + 黑藤墨绿 #2A4034 撞色；
  ep09 革囊战：金红 + 鬼气消散白雾 + 革囊苍白色

lighting: |
  ep08 前段：16 红烛 + 油灯全场橘红，喜庆通明；
  ep08 高潮：黑藤暴起一瞬，灯火摇曳剧烈，
  红光与黑藤墨绿撞色；
  ep09：革囊光泛冷青蓝，鬼气消散化白雾上升

ambient_sounds:
  - 唢呐 + 锣鼓喜乐
  - 鞭炮远响
  - 宾客喧闹
  - ep08 高潮：唢呐戛然 + 玻璃碎裂 + 黑藤破石声 + 惊叫
  - ep09：革囊吞妖时一声"呜"长音 + 寂然

key_props:
  - 百年好合匾额（红底金字）
  - 巨囍字红绸（边长 1.5m）
  - 16 红烛（每根 50cm 高）
  - 天地君亲师牌位
  - 三炷青香
  - 红盖头（蒙在小倩头上）
  - 喜宴 8 桌 + 宾客 30 人
  - ★ 燕赤霞所赠革囊（ep08 末 - ep09 关键道具）

seedream_prompt_prefix: |
  古风3D国漫风格场景"喜堂"，
  宁家正厅改造婚礼喜堂，
  正中"百年好合"匾额（红底金字）+ 巨"囍"字红绸边长 1.5m，
  16 红烛分列两旁每根 50cm 地铺红毯，
  案桌"天地君亲师"牌位 + 三炷青香 + 红盖头，
  外院摆 8 桌喜宴 + 宾客 30 人 + 唢呐锣鼓队 5 人；
  常态：朱红 + 金黄 + 烛火橘喜庆通明；
  高潮变奏（ep08）：黑藤暴起破石撞红绸，红光与墨绿撞色；
  ep09 革囊战：金红 + 革囊冷青蓝光 + 鬼气消散白雾；
  cel-shading 卡通描边 + Unreal Engine 5 路径追踪，
  视觉冲击力强烈但不血腥。
