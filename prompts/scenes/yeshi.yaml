id: yeshi
name_zh: 金华夜市
appearance_in_episodes: [1]

description: |
  金华城西南角夜市，两条十字街，红灯笼挂满商铺檐前；
  雨后湿石板路反光，雾气未散；
  摊位：算命摊、卖糕饼摊、烤栗子炉、字画摊、武器铺；
  人流稀疏（雨夜），衣着多麻布粗服，几个走方道士；
  远处茶肆传出说书声。

palette: "暖橘 #D88748 + 冷青 #2D4A5E + 灯笼红 #B83838"

lighting: |
  红灯笼暖光 + 远处店铺烛火（橘黄）；
  雾气在灯下化为暖光晕；
  雨后湿石板反射灯笼倒影
  
ambient_sounds:
  - 雨水滴答
  - 远处叫卖声
  - 茶肆说书咚锵
  - 烤栗子炉爆裂声

key_props:
  - 红灯笼（约 30 个）
  - 算命摊一柄破伞 + 木牌「测字论运」
  - 茶肆铜壶
  - 烤栗子炉炭火
  - 字画摊宣纸卷

