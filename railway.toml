# Root-level Railway config
# Railway 扫描仓库根目录时会读到此文件，把构建指向 backend/ 子目录。
# 这样你在 Railway UI 里就完全不用设 Root Directory 了。

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
# 必须用 sh -c 包一层，否则 Railway 直接 exec 时 $PORT 不会被展开
# 用 TOML 字面量字符串（单引号）避免双重转义
startCommand = 'sh -c "uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --proxy-headers"'
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Environment groups documented in DEPLOY.md:
#   core_keys     (VOLC_ACCESS_KEY / ANTHROPIC_API_KEY / DEEPSEEK_API_KEY / GEMINI_API_KEY)
#   media_keys    (FAL_API_KEY / ELEVENLABS_API_KEY / REPLICATE_API_TOKEN / HEDRA_API_KEY)
#   advanced_keys (RUNWAY_API_KEY / OPENAI_API_KEY / DASHSCOPE_API_KEY / SUNO_API_KEY)
#   storage_keys  (S3_ENDPOINT / S3_BUCKET / S3_ACCESS_KEY / S3_SECRET_KEY / S3_PUBLIC_BASE_URL)
#   mock_flags    (MOCK_MODE / FORCE_MOCK_* / SKIP_CINEMATIC_MASTER)
# 仅核心组（core_keys + storage_keys）即可获得线上 mock-tier 体验。
